</style><div class="alert alert-danger topframe">你的浏览器实在<strong>太太太太太太旧了</strong>，放学别走，升级完浏览器再说<a class="alert-link" target="_blank" href="http://browsehappy.com">立即升级</a></div><script src="https://cdn.bootcss.com/html5shiv/r29/html5.min.js"></script><script src="https://cdn.bootcss.com/respond.js/1.4.2/respond.min.js"></script><![endif]--></head><body><main><div class="email-page"><div class="email-card"><i class="icon icon-email"></i><h1>邮箱</h1><p class="email-address">z1124340034@sina.com</p><div class="actions"><a class="button primary" href="mailto:z1124340034@sina.com" aria-label="发送邮件">发送邮件</a><button class="button secondary" id="copyBtn" type="button" aria-label="复制邮箱" data-email="z1124340034@sina.com">复制邮箱</button><a class="button ghost" href="../index.html" aria-label="返回主页">返回主页</a></div></div></div></main><style>:root {
  --bg: #1f2023;
  --card: #26272b;
  --text: #e9e9ea;
  --muted: #b6b7ba;
  --accent: #7ac8a4;
  --accent-2: #9aa0ff;
  --shadow: rgba(0,0,0,.35);
}
* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: "Comic Sans MS","Helvetica Neue","Microsoft Yahei",-apple-system,sans-serif;
  background:
    radial-gradient(1200px 600px at 0% 0%, rgba(255,255,255,.02), transparent 60%),
    radial-gradient(1200px 600px at 100% 100%, rgba(255,255,255,.02), transparent 60%),
    var(--bg);
  color: var(--text);
}
.email-page {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 32px 16px;
}
.email-card {
  width: min(680px, 92vw);
  background: linear-gradient(180deg, rgba(255,255,255,.02), transparent 60%) , var(--card);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 18px;
  padding: 32px 28px;
  box-shadow: 0 12px 40px var(--shadow), inset 0 1px 0 rgba(255,255,255,.05);
  backdrop-filter: blur(4px);
  transform: translateY(8px);
  opacity: 0;
  animation: cardIn .7s ease-out forwards;
}
@keyframes cardIn {
  to { transform: none; opacity: 1; }
}
.icon {
  display: inline-block;
  font-size: 40px;
  color: var(--accent);
  filter: drop-shadow(0 6px 10px rgba(122,200,164,.25));
}
h1 {
  margin: 10px 0 12px;
  font-size: 28px;
  letter-spacing: .5px;
}
.email-address {
  margin: 0 0 20px;
  font-size: clamp(18px, 2.6vw, 22px);
  color: var(--text);
  word-break: break-all;
  padding: 10px 14px;
  border-radius: 10px;
  background: rgba(0,0,0,.15);
  border: 1px solid rgba(255,255,255,.06);
}
.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.button {
  appearance: none;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(255,255,255,.04);
  color: var(--text);
  border-radius: 12px;
  padding: 10px 16px;
  font-size: 14px;
  letter-spacing: .2px;
  cursor: pointer;
  transition: transform .15s ease, background .2s ease, border-color .2s ease, color .2s ease, box-shadow .2s ease;
}
.button:hover { transform: translateY(-1px); }
.button:active { transform: translateY(0); }
.button.primary {
  background: linear-gradient(180deg, rgba(122,200,164,.18), rgba(122,200,164,.08));
  border-color: rgba(122,200,164,.35);
  color: #eafff5;
  box-shadow: 0 6px 16px rgba(122,200,164,.25) inset, 0 6px 18px rgba(122,200,164,.18);
}
.button.secondary {
  background: linear-gradient(180deg, rgba(154,160,255,.16), rgba(154,160,255,.08));
  border-color: rgba(154,160,255,.35);
  color: #eef0ff;
  box-shadow: 0 6px 16px rgba(154,160,255,.22) inset, 0 6px 18px rgba(154,160,255,.16);
}
.button.ghost {
  background: transparent;
  border-color: rgba(255,255,255,.16);
  color: var(--muted);
}
@media (max-width: 480px) {
  .email-card { padding: 24px 18px; }
  .actions { gap: 10px; }
  .button { flex: 1; text-align: center; }
}
</style><script>(function () {
  const btn = document.getElementById('copyBtn');
  if (!btn) return;
  btn.addEventListener('click', async function () {
    const email = this.getAttribute('data-email');
    try {
      await navigator.clipboard.writeText(email);
      this.textContent = '已复制';
      this.disabled = true;
      setTimeout(() => {
        this.textContent = '复制邮箱';
        this.disabled = false;
      }, 1600);
    } catch (e) {
      // 回退方案
      const ta = document.createElement('textarea');
      ta.value = email;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch(e) {}
      document.body.removeChild(ta);
      this.textContent = '已复制';
      setTimeout(() => this.textContent = '复制邮箱', 1600);
    }
  }, { passive: true });
})();</script></body></html>
